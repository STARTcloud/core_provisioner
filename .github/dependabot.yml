# Dependabot configuration for Core Provisioner
# The repo ships plain Ruby consumed by Vagrant — the only managed ecosystem
# here is the GitHub Actions toolchain.

version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/.github/workflows'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'github-actions'
      - 'dependencies'
    commit-message:
      prefix: 'ci'
