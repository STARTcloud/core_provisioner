name: Rotate Credentials

# Yearly rotation of the driver's shipped credential material, as a PR — never a
# direct push, because merging is a coordinated act:
#   SSH: box templates bake the bootstrap PUBLIC key at box-build time, so the
#        rotation PR merges together with a box rebuild cycle. Old packages pin
#        old core versions (old key) and keep working.
#   SSL: re-issues the committed dev INTERMEDIATE from the offline root (key in
#        the CA_ROOT_KEY secret) and mints a fresh wildcard dev leaf. The root
#        certificate (ssls/ca/root-ca.crt) is the only thing users/agents trust,
#        so rotation here never requires re-trusting clients.
#
# Required repo secrets for the SSL job:
#   CA_ROOT_KEY             the dev root CA private key (PEM) — offline copy stays with Mark
#   CA_INT_KEY_PASSPHRASE   passphrase for the encrypted intermediate key copy

on:
  schedule:
    - cron: '0 6 1 1 *'
  workflow_dispatch:
    inputs:
      rotate_ssh:
        description: 'Rotate the bootstrap SSH keypair'
        required: false
        default: true
        type: boolean
      rotate_ssl:
        description: 'Rotate the dev intermediate CA + default-signed leaf'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  rotate:
    name: Rotate & open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Rotate bootstrap SSH keypair
        if: ${{ github.event_name == 'schedule' || inputs.rotate_ssh }}
        run: |
          rm -f ssh_keys/id_rsa ssh_keys/id_rsa.pub
          ssh-keygen -t rsa -b 4096 -m PEM -C "vagrantup-startcloud@prominic.net" -N "" -f ssh_keys/id_rsa

      - name: Rotate dev intermediate CA and default-signed leaf
        if: ${{ github.event_name == 'schedule' || inputs.rotate_ssl }}
        env:
          CA_ROOT_KEY: ${{ secrets.CA_ROOT_KEY }}
          CA_INT_KEY_PASSPHRASE: ${{ secrets.CA_INT_KEY_PASSPHRASE }}
        run: |
          if [ -z "$CA_ROOT_KEY" ] || [ -z "$CA_INT_KEY_PASSPHRASE" ]; then
            echo "CA_ROOT_KEY / CA_INT_KEY_PASSPHRASE secrets are not set — run the one-time root bootstrap first." >&2
            exit 1
          fi
          if [ ! -f ssls/ca/root-ca.crt ]; then
            echo "ssls/ca/root-ca.crt is missing — commit the root certificate from the bootstrap first." >&2
            exit 1
          fi
          umask 077
          printf '%s\n' "$CA_ROOT_KEY" > "$RUNNER_TEMP/root-ca.key"

          # New intermediate: key (plain + encrypted copy), CSR, signed by the root
          openssl genrsa -out ssls/ca/ca-certificate.no.key 4096
          openssl pkcs8 -topk8 -v2 aes-256-cbc -passout env:CA_INT_KEY_PASSPHRASE \
            -in ssls/ca/ca-certificate.no.key -out ssls/ca/ca-certificate.key
          openssl req -new -key ssls/ca/ca-certificate.no.key \
            -subj "/C=US/O=STARTcloud/CN=STARTcloud Dev Intermediate CA" \
            -out "$RUNNER_TEMP/intermediate.csr"
          printf 'basicConstraints=critical,CA:TRUE,pathlen:0\nkeyUsage=critical,keyCertSign,cRLSign\nsubjectKeyIdentifier=hash\nauthorityKeyIdentifier=keyid:always\n' > "$RUNNER_TEMP/int.ext"
          openssl x509 -req -in "$RUNNER_TEMP/intermediate.csr" \
            -CA ssls/ca/root-ca.crt -CAkey "$RUNNER_TEMP/root-ca.key" -CAcreateserial \
            -days 1095 -sha256 -extfile "$RUNNER_TEMP/int.ext" \
            -out ssls/ca/ca-certificate.crt
          cp ssls/ca/ca-certificate.crt ssls/ca/default-signed.ca

          # Fresh wildcard dev leaf signed by the new intermediate
          openssl genrsa -out ssls/key/default-signed.key 2048
          openssl req -new -key ssls/key/default-signed.key \
            -subj "/C=US/O=STARTcloud/CN=*.startcloud.local" \
            -out "$RUNNER_TEMP/leaf.csr"
          printf 'basicConstraints=CA:FALSE\nkeyUsage=critical,digitalSignature,keyEncipherment\nextendedKeyUsage=serverAuth,clientAuth\nsubjectAltName=DNS:*.startcloud.local,DNS:startcloud.local,DNS:localhost,IP:127.0.0.1\n' > "$RUNNER_TEMP/leaf.ext"
          openssl x509 -req -in "$RUNNER_TEMP/leaf.csr" \
            -CA ssls/ca/ca-certificate.crt -CAkey ssls/ca/ca-certificate.no.key -CAcreateserial \
            -days 365 -sha256 -extfile "$RUNNER_TEMP/leaf.ext" \
            -out ssls/crt/default-signed.crt
          cat ssls/crt/default-signed.crt ssls/key/default-signed.key > ssls/combined/default-signed.crt

      - name: Open rotation PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: rotate-credentials
          commit-message: 'fix: rotate bootstrap SSH keypair and dev PKI material'
          title: 'fix: rotate bootstrap SSH keypair and dev PKI material'
          body: |
            Automated credential rotation.

            - SSH: merging this requires a box template rebuild cycle — boxes bake the bootstrap public key.
            - SSL: new intermediate (signed by the offline root) + fresh wildcard dev leaf. Clients trusting `ssls/ca/root-ca.crt` are unaffected.
          labels: |
            dependencies
            automated
          delete-branch: true
